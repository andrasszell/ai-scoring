# Minimal valid registry for unit tests (Step 1.3).
registry_version: "test-1.0"

loaders:
  - id: test_loader
    display_name: Test loader
    vendor: Test vendor
    api_base_url: https://example.com/load
    auth:
      env_key: TEST_LOADER_KEY
      required: true
    phase: 1
    enabled: true
    cost_model: free

platforms:
  - id: active_phase1
    collector: sec_filings
    cli_source: sec
    source_type: sec_annual_filing
    display_name: Active phase 1
    vendor: SEC
    api_base_url: https://data.sec.gov
    auth:
      env_key: SEC_USER_AGENT
      required: true
    phase: 1
    enabled: true
    cost_model: free
    source_category: regulatory_filing
    source_reliability: high
    confidence_initial: 0.75

  - id: disabled_phase1
    collector: earnings_calls
    cli_source: earnings
    source_type: earnings_call_transcript
    display_name: Disabled phase 1
    vendor: FMP
    api_base_url: https://financialmodelingprep.com
    auth:
      env_key: FMP_API_KEY
      required: false
    phase: 1
    enabled: false
    cost_model: paid
    source_category: official_company
    source_reliability: high
    confidence_initial: 0.70

  - id: active_phase2
    collector: github_repos
    cli_source: github
    source_type: github_repository
    display_name: Phase 2 stub
    vendor: GitHub
    api_base_url: https://api.github.com
    auth:
      env_key: GITHUB_TOKEN
      required: false
    phase: 2
    enabled: true
    cost_model: free
    source_category: third_party_database
    source_reliability: medium
    confidence_initial: 0.55

  - id: disabled_phase3
    collector: lightcast_hiring
    cli_source: lightcast
    source_type: job_posting
    display_name: Phase 3 stub
    vendor: Lightcast
    api_base_url: ""
    auth:
      env_key: LIGHTCAST_API_KEY
      required: true
    phase: 3
    enabled: false
    cost_model: paid
    source_category: job_posting
    source_reliability: medium
    confidence_initial: 0.50
